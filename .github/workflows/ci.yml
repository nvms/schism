name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: build
        run: zig build -Dskip-vulkan

      - name: test
        run: zig build test
